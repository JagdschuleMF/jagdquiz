<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vielen Dank – Jagdschule Mittelfranken</title>
<style>
:root{--olive:#5c6731;--sand:#d8c99b;--green:#3c493f;--light:#f8f8f8;--dark:#151515;--white:#fff}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(216,201,155,.35),transparent 34rem),linear-gradient(135deg,#f8f8f8 0%,#f3efe2 100%);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.card{max-width:760px;width:100%;background:rgba(255,255,255,.96);border:1px solid rgba(216,201,155,.9);border-radius:28px;box-shadow:0 24px 70px rgba(21,21,21,.10);padding:34px;text-align:center}.logo{max-width:280px;width:100%;height:auto;margin:0 auto 18px;display:block}h1{color:var(--green);font-size:clamp(2rem,5vw,3.4rem);line-height:1.05;margin:0 0 16px}p{line-height:1.6;font-size:1.1rem}.btn{appearance:none;border:none;border-radius:16px;padding:15px 20px;font-weight:900;cursor:pointer;background:var(--olive);color:var(--light);box-shadow:0 8px 20px rgba(92,103,49,.22);transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;font-size:1.05rem;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;margin-top:18px}.btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(92,103,49,.26)}
</style>
</head>
<body>
<section class="card">
<img src="logo.svg" class="logo" alt="Jagdschule Mittelfranken Logo" onerror="this.style.display='none'"/>
<h1>Vielen Dank fürs Mitmachen!</h1>
<p>Die Gewinner werden Anfang der kommenden Woche ausgelost und persönlich benachrichtigt.</p>
<a class="btn" href="https://jagdschule-mittelfranken.de/">Zur Jagdschule Mittelfranken</a>
</section>
</body>
</html>
