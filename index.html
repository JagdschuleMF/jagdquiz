<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jagdquiz – Jagdschule Mittelfranken</title>
<style>
:root{--olive:#5c6731;--sand:#d8c99b;--green:#3c493f;--light:#f8f8f8;--dark:#151515;--white:#fff;--ok:#eef2df;--warn:#fff3ed;--bad:#9a3412}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(216,201,155,.35),transparent 34rem),linear-gradient(135deg,#f8f8f8 0%,#f3efe2 100%);color:var(--dark);min-height:100vh}.app{max-width:900px;margin:0 auto;padding:18px}.card{background:rgba(255,255,255,.96);border:1px solid rgba(216,201,155,.9);border-radius:28px;box-shadow:0 24px 70px rgba(21,21,21,.10);padding:28px}.center{text-align:center}.grid{display:grid;gap:16px}.logo{max-width:360px;width:100%;height:auto;margin:0 auto 6px;display:block}.logo-small{height:58px;width:auto;object-fit:contain}h1{color:var(--green);font-size:clamp(2rem,5vw,3.6rem);line-height:1.05;margin:0}h2{color:var(--green);font-size:clamp(1.45rem,3vw,2.2rem);line-height:1.1;margin:0}h3{color:var(--green);margin:0 0 8px}p{line-height:1.55}.muted{color:rgba(21,21,21,.66)}.badge{display:inline-flex;align-items:center;gap:8px;background:var(--sand);color:var(--dark);border-radius:999px;padding:8px 14px;font-size:.9rem;font-weight:800}.badge.dark{background:var(--green);color:var(--light)}.badge.light{background:var(--ok);color:var(--green)}.btn{appearance:none;border:none;border-radius:16px;padding:15px 20px;font-weight:900;cursor:pointer;background:var(--olive);color:var(--light);box-shadow:0 8px 20px rgba(92,103,49,.22);transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;font-size:1.05rem}.btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(92,103,49,.26)}.btn.secondary{background:var(--green)}.btn.outline{background:var(--white);color:var(--green);border:1px solid var(--sand);box-shadow:none}.btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}.btn-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center}.choice{width:100%;text-align:left;border:1px solid var(--sand);background:var(--white);border-radius:18px;padding:16px;cursor:pointer;font-size:1rem;line-height:1.45;transition:background .12s ease,border .12s ease,box-shadow .12s ease}.choice:hover{box-shadow:0 8px 22px rgba(21,21,21,.06)}.choice.selected{background:var(--sand);border-color:var(--olive)}.letter{font-weight:900;color:var(--green);margin-right:8px}.progress-wrap{height:12px;background:#ebe5d4;border-radius:999px;overflow:hidden}.progress{height:100%;background:var(--olive);width:0%;transition:width .2s ease}.field{display:grid;gap:6px}.field label{font-size:.88rem;font-weight:800;color:var(--green)}input[type=text],input[type=email],input[type=tel]{width:100%;border:1px solid var(--sand);border-radius:14px;padding:13px 14px;font-size:1rem;background:#fff}.question-title{font-size:clamp(1.35rem,3vw,2.15rem);line-height:1.2;font-weight:850;margin:0;color:var(--dark)}.meta{color:var(--olive);text-transform:uppercase;letter-spacing:.06em;font-weight:850;font-size:.82rem}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.result-card{background:var(--white);border:1px solid var(--sand);border-radius:20px;padding:18px}.result-card.good{border-color:var(--olive);background:var(--ok)}.result-card.warn{border-color:#c97b63;background:var(--warn)}.percent{color:var(--olive);font-size:clamp(3rem,8vw,5rem);font-weight:950}.check-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0}.check-row input{margin-top:3px;accent-color:var(--olive)}.small{font-size:.92rem}.hidden{display:none}.fineprint{font-size:.82rem;color:rgba(21,21,21,.62)}@media(max-width:700px){.app{padding:12px}.card{padding:20px;border-radius:22px}.topbar{display:block}.logo-small{height:48px;margin-bottom:12px}.btn{width:100%}}
</style>
</head>
<body><main class="app"><div id="root"></div></main>
<script>
// Optional: Hier kann später ein eigener Formular-Endpunkt eingetragen werden, z.B. Google Forms, Formspree, Make/Zapier oder Vercel Function.
const SUBMISSION_ENDPOINT = "";
const STORAGE_KEY = "jagdquiz-jagdschule-mittelfranken-submissions-v1";
const letters = ['A','B','C','D','E','F'];
let QUESTIONS = [];
let state = {screen:'loading', quiz:[], index:0, selected:[], answers:[], contact:null, submitted:false};
const root = document.getElementById('root');
function esc(str){return String(str??'').replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sg(q){return (q.id||'').slice(0,3)}
function isCorrect(selected, correct){return [...selected].sort().join(',') === [...correct].sort().join(',')}
function fmt(indices){return indices?.length ? indices.map(i=>letters[i]).join(', ') : 'keine Antwort'}
async function init(){try{const res=await fetch('questions.json');QUESTIONS=await res.json();state.screen='home'}catch(e){state.screen='error'}render();}
function pickQuiz(){const quiz=[];['SG1','SG2','SG3','SG4','SG5','SG6'].forEach(s=>{const pool=QUESTIONS.filter(q=>sg(q)===s);if(pool.length) quiz.push(shuffle(pool)[0]);});return quiz;}
function startQuiz(){state={screen:'quiz',quiz:pickQuiz(),index:0,selected:[],answers:[],contact:null,submitted:false};render();}
function toggle(i){if(state.selected.includes(i)) state.selected=state.selected.filter(x=>x!==i);else state.selected=[...state.selected,i];render();}
function next(){if(state.selected.length===0)return;const q=state.quiz[state.index];state.answers.push({id:q.id,sachgebiet:sg(q),question:q.question,selected:[...state.selected],correct:q.correct,isCorrect:isCorrect(state.selected,q.correct)});if(state.index+1>=state.quiz.length){state.screen='contact';state.selected=[]}else{state.index++;state.selected=[]}render();}
function score(){const right=state.answers.filter(a=>a.isCorrect).length;return {right,total:state.quiz.length,percent:Math.round(right/state.quiz.length*100)};}
function resultLabel(right){if(right===6)return ['🏆 Jagdprofi','Stark! Du hast alle Fragen richtig beantwortet.'];if(right===5)return ['🌲 Sehr gut!','Du hast schon ein richtig gutes Gespür für Jagdwissen.'];if(right===4)return ['🍂 Gute Grundlage','Da ist schon viel Wissen da – ein paar Details fehlen noch.'];if(right===3)return ['🌿 Da geht noch mehr','Solide mitgemacht. Genau dafür gibt es den Jagdscheinkurs.'];return ['🦌 Zeit für den Jagdscheinkurs','Kein Problem – Jagdwissen lernt man Schritt für Schritt.'];}
function render(){
 if(state.screen==='loading') root.innerHTML='<section class="card center"><h2>Lade Jagdquiz…</h2></section>';
 else if(state.screen==='error') root.innerHTML='<section class="card center"><h2>Fragen konnten nicht geladen werden.</h2></section>';
 else if(state.screen==='home') renderHome();
 else if(state.screen==='quiz') renderQuiz();
 else if(state.screen==='contact') renderContact();
 else if(state.screen==='result') renderResult();
}
function renderHome(){root.innerHTML=`<section class="card center grid"><img src="logo.svg" class="logo" alt="Jagdschule Mittelfranken Logo" onerror="this.style.display='none'"/><span class="badge dark">Digitaler Jagdsonntag</span><h1>Jagdquiz</h1><p class="muted" style="max-width:650px;margin:0 auto">Teste dein Jagdwissen in 6 kurzen Fragen – je eine Frage aus jedem Sachgebiet der Bayerischen Jägerprüfung.</p><div class="btn-row"><span class="badge light">6 Fragen</span><span class="badge light">ca. 2 Minuten</span><span class="badge light">Gewinnspiel</span></div><button class="btn secondary" onclick="startQuiz()">Jagdquiz starten</button><p class="fineprint">Hinweis: Die Teilnahme am Gewinnspiel erfolgt nach Abschluss des Quiz über ein kurzes Formular.</p></section>`;}
function renderQuiz(){const q=state.quiz[state.index];const pct=((state.index)/state.quiz.length*100).toFixed(0);root.innerHTML=`<div class="topbar"><img src="logo.svg" class="logo-small" alt="Logo" onerror="this.style.display='none'"/><span class="badge">Frage ${state.index+1} von ${state.quiz.length}</span></div><section class="card grid"><div class="progress-wrap"><div class="progress" style="width:${pct}%"></div></div><div><div class="meta">${esc(q.sachgebiet)} · ${esc(q.thema)}</div><h2 class="question-title">${esc(q.question)}</h2></div><div class="grid">${q.answers.map((a,i)=>`<button class="choice ${state.selected.includes(i)?'selected':''}" onclick="toggle(${i})"><span class="letter">${a.letter}</span>${esc(a.text)}</button>`).join('')}</div><button class="btn secondary" ${state.selected.length===0?'disabled':''} onclick="next()">Weiter</button></section>`;}
function renderContact(){root.innerHTML=`<section class="card grid"><span class="badge dark">Gewinnspiel</span><h2>Geschafft! 🎁</h2><p class="muted">Du hast alle 6 Fragen beantwortet. Gib jetzt deine Kontaktdaten ein, um am Gewinnspiel teilzunehmen.</p><form id="contactForm" class="grid" onsubmit="submitContact(event)"><div class="field"><label for="firstName">Vorname *</label><input id="firstName" name="firstName" type="text" required autocomplete="given-name"></div><div class="field"><label for="lastName">Nachname *</label><input id="lastName" name="lastName" type="text" required autocomplete="family-name"></div><div class="field"><label for="email">E-Mail *</label><input id="email" name="email" type="email" required autocomplete="email"></div><div class="field"><label for="phone">Telefon optional</label><input id="phone" name="phone" type="tel" autocomplete="tel"></div><label class="check-row"><input id="privacy" type="checkbox" required><span>Ich akzeptiere die Datenschutzhinweise und bin damit einverstanden, dass meine Angaben zur Durchführung des Gewinnspiels verarbeitet werden. *</span></label><label class="check-row"><input id="marketing" type="checkbox"><span>Ich möchte per E-Mail Informationen zu Jagdscheinkursen und Angeboten der Jagdschule Mittelfranken erhalten. Diese Einwilligung ist freiwillig und kann jederzeit widerrufen werden.</span></label><button class="btn secondary" type="submit">Am Gewinnspiel teilnehmen</button><p class="fineprint">* Pflichtfelder. Die Einwilligung zur Kontaktaufnahme ist freiwillig und keine Voraussetzung für die Gewinnspielteilnahme.</p></form></section>`;}
async function submitContact(e){e.preventDefault();const form=e.target;const s=score();const payload={createdAt:new Date().toISOString(),firstName:form.firstName.value.trim(),lastName:form.lastName.value.trim(),email:form.email.value.trim(),phone:form.phone.value.trim(),privacyAccepted:document.getElementById('privacy').checked,marketingConsent:document.getElementById('marketing').checked,score:s,answers:state.answers.map(a=>({id:a.id,sachgebiet:a.sachgebiet,selected:fmt(a.selected),correct:fmt(a.correct),isCorrect:a.isCorrect}))};state.contact=payload;let stored=false, sent=false, error=null;try{const existing=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');existing.push(payload);localStorage.setItem(STORAGE_KEY,JSON.stringify(existing));stored=true;}catch(e){error=e.message}if(SUBMISSION_ENDPOINT){try{const res=await fetch(SUBMISSION_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});sent=res.ok;if(!res.ok) error='Formular-Endpunkt nicht erreichbar';}catch(e){error=e.message}}state.submitted={stored,sent,error};state.screen='result';render();}
function renderResult(){const s=score();const [title,msg]=resultLabel(s.right);const wrong=state.answers.filter(a=>!a.isCorrect);root.innerHTML=`<section class="card center grid"><img src="logo.svg" class="logo-small" alt="Logo" onerror="this.style.display='none'" style="margin:0 auto"/><span class="badge dark">Danke für deine Teilnahme!</span><h2>${title}</h2><div class="percent">${s.right}/${s.total}</div><p class="muted">${msg}</p><div class="result-card ${s.right>=4?'good':'warn'}"><strong>${s.percent}% richtig</strong><br>${s.right} von ${s.total} Fragen richtig beantwortet.</div><div class="result-card" style="text-align:left"><h3>Kurze Übersicht</h3>${state.answers.map((a,idx)=>`<p class="small"><strong>${idx+1}. ${a.sachgebiet}</strong>: ${a.isCorrect?'✅ richtig':'❌ falsch'}<br><span class="muted">Deine Antwort: ${fmt(a.selected)} · Richtige Antwort: ${fmt(a.correct)}</span></p>`).join('')}</div><div class="btn-row"><button class="btn secondary" onclick="startQuiz()">Noch einmal spielen</button><button class="btn outline" onclick="state.screen='home';render()">Zur Startseite</button></div><p class="fineprint">Die Gewinner werden nach dem Jagdsonntag ausgelost.</p>${SUBMISSION_ENDPOINT?'':`<p class="fineprint">Technischer Hinweis: In dieser Version werden Teilnahmedaten lokal im Browser gespeichert. Für den öffentlichen Einsatz bitte einen Formular-Endpunkt in <code>index.html</code> eintragen.</p>`}</section>`;}
init();
</script>
</body>
</html>
