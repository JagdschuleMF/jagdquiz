<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jagdquiz – Jagdschule Mittelfranken</title>
<style>
:root{--olive:#5c6731;--sand:#d8c99b;--green:#3c493f;--light:#f8f8f8;--dark:#151515;--white:#fff;--ok:#eef2df;--warn:#fff3ed;--bad:#9a3412}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(216,201,155,.35),transparent 34rem),linear-gradient(135deg,#f8f8f8 0%,#f3efe2 100%);color:var(--dark);min-height:100vh}.app{max-width:900px;margin:0 auto;padding:18px}.card{background:rgba(255,255,255,.96);border:1px solid rgba(216,201,155,.9);border-radius:28px;box-shadow:0 24px 70px rgba(21,21,21,.10);padding:28px}.center{text-align:center}.grid{display:grid;gap:16px}.logo{max-width:360px;width:100%;height:auto;margin:0 auto 6px;display:block}.logo-small{height:58px;width:auto;object-fit:contain}h1{color:var(--green);font-size:clamp(2rem,5vw,3.6rem);line-height:1.05;margin:0}h2{color:var(--green);font-size:clamp(1.45rem,3vw,2.2rem);line-height:1.1;margin:0}h3{color:var(--green);margin:0 0 8px}p{line-height:1.55}.muted{color:rgba(21,21,21,.66)}.badge{display:inline-flex;align-items:center;gap:8px;background:var(--sand);color:var(--dark);border-radius:999px;padding:8px 14px;font-size:.9rem;font-weight:800}.badge.dark{background:var(--green);color:var(--light)}.badge.light{background:var(--ok);color:var(--green)}.btn{appearance:none;border:none;border-radius:16px;padding:15px 20px;font-weight:900;cursor:pointer;background:var(--olive);color:var(--light);box-shadow:0 8px 20px rgba(92,103,49,.22);transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;font-size:1.05rem;text-decoration:none;display:inline-flex;justify-content:center;align-items:center}.btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(92,103,49,.26)}.btn.secondary{background:var(--green)}.btn.outline{background:var(--white);color:var(--green);border:1px solid var(--sand);box-shadow:none}.btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}.btn-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center}.choice{width:100%;text-align:left;border:1px solid var(--sand);background:var(--white);border-radius:18px;padding:16px;cursor:pointer;font-size:1rem;line-height:1.45;transition:background .12s ease,border .12s ease,box-shadow .12s ease}.choice:hover{box-shadow:0 8px 22px rgba(21,21,21,.06)}.choice.selected{background:var(--sand);border-color:var(--olive)}.letter{font-weight:900;color:var(--green);margin-right:8px}.progress-wrap{height:12px;background:#ebe5d4;border-radius:999px;overflow:hidden}.progress{height:100%;background:var(--olive);width:0%;transition:width .2s ease}.question-title{font-size:clamp(1.35rem,3vw,2.15rem);line-height:1.2;font-weight:850;margin:0;color:var(--dark)}.meta{color:var(--olive);text-transform:uppercase;letter-spacing:.06em;font-weight:850;font-size:.82rem}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.result-card{background:var(--white);border:1px solid var(--sand);border-radius:20px;padding:18px}.result-card.good{border-color:var(--olive);background:var(--ok)}.result-card.warn{border-color:#c97b63;background:var(--warn)}.percent{color:var(--olive);font-size:clamp(3rem,8vw,5rem);font-weight:950}.sg-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;text-align:left}.sg-pill{border:1px solid var(--sand);border-radius:16px;padding:11px 12px;background:#fff;font-size:.95rem}.sg-pill.ok{background:var(--ok);border-color:var(--olive)}.sg-pill.bad{background:var(--warn);border-color:#c97b63}.small{font-size:.92rem}.hidden{display:none}.fineprint{font-size:.82rem;color:rgba(21,21,21,.62)}code{background:#f3efe2;border-radius:6px;padding:2px 5px}@media(max-width:700px){.app{padding:12px}.card{padding:20px;border-radius:22px}.topbar{display:block}.logo-small{height:48px;margin-bottom:12px}.btn{width:100%}.sg-grid{grid-template-columns:1fr}}
</style>
</head>
<body><main class="app"><div id="root"></div></main>
<script>
const TALLY_URL = "https://tally.so/r/obgrjN";
const PRIVACY_URL = "https://jagdschule-mittelfranken.de/datenschutzerklaerung/";
const WEBSITE_URL = "https://jagdschule-mittelfranken.de/";
const STORAGE_KEY = "jagdquiz-jagdschule-mittelfranken-results-v2";
const letters = ['A','B','C','D','E','F'];
let QUESTIONS = [];
let state = {screen:'loading', quiz:[], index:0, selected:[], answers:[]};
const root = document.getElementById('root');
function esc(str){return String(str??'').replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sg(q){return (q.id||'').slice(0,3)}
function shortSg(id){return String(id||'').slice(0,3)}
function isCorrect(selected, correct){return [...selected].sort().join(',') === [...correct].sort().join(',')}
function fmt(indices){return indices?.length ? indices.map(i=>letters[i]).join(', ') : 'keine Antwort'}
function sgLabel(id){return ({SG1:'Waffenkunde',SG2:'Wildbiologie',SG3:'Recht',SG4:'Jagdpraxis',SG5:'Hundewesen',SG6:'Naturschutz'})[shortSg(id)] || shortSg(id)}
async function init(){try{const res=await fetch('questions.json');QUESTIONS=await res.json();state.screen='home'}catch(e){state.screen='error'}render();}
function pickQuiz(){const quiz=[];['SG1','SG2','SG3','SG4','SG5','SG6'].forEach(s=>{const pool=QUESTIONS.filter(q=>sg(q)===s);if(pool.length) quiz.push(shuffle(pool)[0]);});return quiz;}
function startQuiz(){state={screen:'quiz',quiz:pickQuiz(),index:0,selected:[],answers:[]};render();}
function toggle(i){if(state.selected.includes(i)) state.selected=state.selected.filter(x=>x!==i);else state.selected=[...state.selected,i];render();}
function next(){if(state.selected.length===0)return;const q=state.quiz[state.index];state.answers.push({id:q.id,sachgebiet:sg(q),question:q.question,selected:[...state.selected],correct:q.correct,isCorrect:isCorrect(state.selected,q.correct)});if(state.index+1>=state.quiz.length){state.screen='result';state.selected=[];saveLocalResult();}else{state.index++;state.selected=[]}render();}
function score(){const total=state.quiz.length || 6;const right=state.answers.filter(a=>a.isCorrect).length;return {right,total,percent:Math.round(right/total*100)};}
function resultLabel(right){if(right===6)return ['🏆 Jagdprofi','Stark! Du hast alle Fragen richtig beantwortet.'];if(right===5)return ['🌲 Sehr gut!','Du hast schon ein richtig gutes Gespür für Jagdwissen.'];if(right===4)return ['🍂 Gute Grundlage','Da ist schon viel Wissen da – ein paar Details fehlen noch.'];if(right===3)return ['🌿 Da geht noch mehr','Solide mitgemacht. Genau dafür gibt es den Jagdscheinkurs.'];return ['🦌 Zeit für den Jagdscheinkurs','Kein Problem – Jagdwissen lernt man Schritt für Schritt.'];}
function saveLocalResult(){try{const s=score();const payload={createdAt:new Date().toISOString(),score:s,answers:state.answers.map(a=>({id:a.id,sachgebiet:a.sachgebiet,selected:fmt(a.selected),correct:fmt(a.correct),isCorrect:a.isCorrect}))};const existing=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');existing.push(payload);localStorage.setItem(STORAGE_KEY,JSON.stringify(existing.slice(-100)));}catch(e){}}
function tallyLink(){const s=score();const resultText=`${s.right} von ${s.total}`;const questionIds=state.answers.map(a=>a.id).join(', ');const correctIds=state.answers.filter(a=>a.isCorrect).map(a=>a.id).join(', ');const wrongIds=state.answers.filter(a=>!a.isCorrect).map(a=>a.id).join(', ');const params=new URLSearchParams({
  ergebnis: resultText, Ergebnis: resultText,
  punkte: String(s.right), Punkte: String(s.right), 'Richtige Antworten': String(s.right), richtige_antworten: String(s.right),
  prozent: String(s.percent), Prozent: String(s.percent),
  fragen: questionIds, Fragen: questionIds,
  richtige_fragen: correctIds, falsche_fragen: wrongIds,
  quelle: 'Jagdquiz Jagdschule Mittelfranken',
  datenschutz_url: PRIVACY_URL,
  danke_url: new URL(THANK_YOU_URL, window.location.href).toString()
});return `${TALLY_URL}?${params.toString()}`;}
function goTally(){window.location.href=tallyLink();}
function render(){if(state.screen==='loading') root.innerHTML='<section class="card center"><h2>Lade Jagdquiz…</h2></section>';else if(state.screen==='error') root.innerHTML='<section class="card center"><h2>Fragen konnten nicht geladen werden.</h2></section>';else if(state.screen==='home') renderHome();else if(state.screen==='quiz') renderQuiz();else if(state.screen==='result') renderResult();}
function renderHome(){root.innerHTML=`<section class="card center grid"><img src="logo.svg" class="logo" alt="Jagdschule Mittelfranken Logo" onerror="this.style.display='none'"/><h1>Jagdquiz</h1><p class="muted" style="max-width:650px;margin:0 auto">Teste dein Jagdwissen in 6 kurzen Fragen – je eine Frage aus jedem Sachgebiet der Bayerischen Jägerprüfung.</p><div class="btn-row"><span class="badge light">6 Fragen</span><span class="badge light">ca. 2 Minuten</span><span class="badge light">Gewinnspiel</span></div><button class="btn secondary" onclick="startQuiz()">Jagdquiz starten</button><p class="fineprint">Hinweis: Die Teilnahme am Gewinnspiel erfolgt nach Abschluss des Quiz über ein kurzes Formular.</p></section>`;}
function renderQuiz(){const q=state.quiz[state.index];const pct=(state.index/state.quiz.length*100).toFixed(0);root.innerHTML=`<div class="topbar"><img src="logo.svg" class="logo-small" alt="Logo" onerror="this.style.display='none'"/><span class="badge">Frage ${state.index+1} von ${state.quiz.length}</span></div><section class="card grid"><div class="progress-wrap"><div class="progress" style="width:${pct}%"></div></div><div><div class="meta">${esc(sgLabel(q.id))}</div><h2 class="question-title">${esc(q.question)}</h2></div><div class="grid">${q.answers.map((a,i)=>`<button class="choice ${state.selected.includes(i)?'selected':''}" onclick="toggle(${i})"><span class="letter">${a.letter}</span>${esc(a.text)}</button>`).join('')}</div><button class="btn secondary" ${state.selected.length===0?'disabled':''} onclick="next()">Weiter</button></section>`;}
function renderResult(){const s=score();const [title,msg]=resultLabel(s.right);const wrong=state.answers.filter(a=>!a.isCorrect);root.innerHTML=`<section class="card center grid"><img src="logo.svg" class="logo-small" alt="Logo" onerror="this.style.display='none'" style="margin:0 auto"/><span class="badge dark">Geschafft!</span><h2>🦌 Herzlichen Glückwunsch!</h2><div class="result-card good" style="text-align:left"><p><strong>Du hast gerade einen kleinen Einblick in die Bayerische Jägerprüfung bekommen.</strong></p><p>Vielleicht war das heute der erste Schritt auf deinem Weg zum <strong>Jagdschein</strong>.</p><p>In unserem Jagdscheinkurs lernst du nicht nur für die Prüfung – sondern für die verantwortungsvolle Jagdpraxis in der Natur.</p><p><strong>Waidmannsheil und vielen Dank fürs Mitmachen!</strong></p></div><div class="result-card" style="text-align:left;border-width:2px"><h3>📸 Bevor du weiterscrollst …</h3><p><strong>Mach jetzt einen Screenshot deines Ergebnisses!</strong></p><p>Teile ihn in deiner Instagram-Story und markiere <strong>@jagdschule_mittelfranken</strong>.</p><p>🏆 <strong>Unter allen geteilten Stories verlosen wir zusätzlich eine kleine Überraschung.</strong></p><p class="fineprint">Mit etwas Glück teilen wir deine Story auf unserem Instagram-Kanal.</p><p><strong>⬇️ Dein Ergebnis findest du direkt darunter.</strong></p></div><h2>${title}</h2><div class="percent">${s.right}/${s.total}</div><p class="muted">${msg}</p><div class="result-card ${s.right>=4?'good':'warn'}"><strong>${s.percent}% richtig</strong><br>${s.right} von ${s.total} Fragen richtig beantwortet.</div><div class="result-card" style="text-align:left"><h3>Dein Ergebnis nach Sachgebiet</h3><div class="sg-grid">${state.answers.map(a=>`<div class="sg-pill ${a.isCorrect?'ok':'bad'}"><strong>${a.sachgebiet}</strong> · ${sgLabel(a.id)}<br>${a.isCorrect?'✅ richtig':'❌ falsch'}</div>`).join('')}</div></div><div class="result-card" style="text-align:left"><h3>🎁 Gewinnspiel</h3><p>Möchtest du am Gewinnspiel teilnehmen? Über den Button öffnet sich unser kurzes Formular. Dein Quizergebnis wird automatisch mitgegeben.</p><p class="fineprint">Hinweis zum Datenschutz: Die Verarbeitung deiner Angaben erfolgt gemäß unserer <a href="${PRIVACY_URL}" target="_blank" rel="noopener">Datenschutzerklärung</a>.</p><div class="btn-row" style="justify-content:flex-start"><button class="btn secondary" onclick="goTally()">Jetzt am Gewinnspiel teilnehmen</button></div></div><div class="result-card" style="text-align:left"><h3>Hat dir das Quiz Spaß gemacht?</h3><p>Im Jagdscheinkurs der Jagdschule Mittelfranken erwarten dich über <strong>1.300 Original-Prüfungsfragen</strong> im digitalen Prüfungstrainer – kombiniert mit Praxis, Revierarbeit und persönlicher Begleitung.</p><div class="btn-row" style="justify-content:flex-start"><a class="btn outline" href="${WEBSITE_URL}" target="_blank" rel="noopener">Mehr über die Jagdschule erfahren</a><button class="btn outline" onclick="startQuiz()">Quiz erneut spielen</button></div></div><p class="fineprint">Die Teilnahme am Gewinnspiel erfolgt über Tally. Die freiwillige Einwilligung zur Kontaktaufnahme ist keine Voraussetzung für die Gewinnspielteilnahme. <a href="${PRIVACY_URL}" target="_blank" rel="noopener">Datenschutzerklärung</a></p></section>`;}
init();
</script>
</body>
</html>
